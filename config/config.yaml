models:
  stt_vosk:
    en: "models/stt_vosk/vosk-model-small-en-us-0.15"
    fr: "models/stt_vosk/vosk-model-small-fr-0.22"
  tts_piper:
    fr_upmc: "models/tts_piper/fr_FR-upmc-medium.onnx"
    fr_upmc_json: "models/tts_piper/fr_FR-upmc-medium.onnx.json"
    en_amy: "models/tts_piper/en_US-amy-medium.onnx"
    en_amy_json: "models/tts_piper/en_US-amy-medium.onnx.json"

testing:
  output_dir: "tests/output"
  run_integration_tests: true

# --- COMMANDES ROBOT QT ---
qt_robot:
  default_velocity: 20
  gestures:
    - "QT/hi"
    - "QT/bye"
    - "QT/wave"
    - "QT/nod"
    - "QT/shake_head"
    - "QT/thinking"
    - "QT/surprise"
    - "QT/angry"
    - "QT/kiss"
  emotions:
    - "QT/happy"
    - "QT/sad"
    - "QT/angry"
    - "QT/surprise"
    - "QT/neutral"

# --- VESTE RASPBERRY PI ---
vest:
  ip: "192.168.100.2"
  user: "pi"
  password: "raspberry"
  script_path: "/home/pi/vest/inferenceQT0526.py"
  venv_path: "/home/pi/vest/venv/bin/activate"
  port: 65432

# --- SCÉNARIOS ---
scenarios:
  emotion_streak_required: 5      # Détections consécutives pour valider une émotion
  gesture_streak_required: 3      # Détections consécutives pour valider un geste
  emotion_confidence_threshold: 0.5